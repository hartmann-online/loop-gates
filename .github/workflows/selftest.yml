name: selftest

# Gate-Efficacy fuer das Gates-Repo selbst (ADR-0123-Prinzip, Spec §5):
#   schema              -- alle Edition-Profile validieren gegen profile.schema.json
#   green               -- edition-quality (lokal, PR-Stand via gates-ref) muss auf fixtures/green GRUEN sein
#   red                 -- jeder blockierende Eigen-Check muss fixtures/red ROT machen (erwartetes Fail)
#   fleet-mode          -- Prod-Modus (--base-url) gruen/rot verifizieren
#   acceptance-validate -- check-acceptance.mjs: skip/red/green verifizieren (Hebel 1, ADR-0150 E4)
#   app-ci-validate     -- app-ci.yml Invarianten pruefen (evals-Guard + kein secrets:inherit)
# Lighthouse/axe-Rot-Faelle sind bewusst nicht fixture-getestet (Fremd-Tools, Kosten) -- dokumentiert.

on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22" }
      - name: Edition-Profile gegen Schema validieren
        run: |
          npx --yes ajv-cli validate -s profiles/profile.schema.json \
            -d "profiles/edition-foundation.json" \
            -d "profiles/edition-handcrafted.json" \
            -d "profiles/edition-masterpiece.json" \
            -d "profiles/fixture.json"

  green:
    uses: ./.github/workflows/edition-quality.yml
    with:
      profile: fixture
      workdir: fixtures/green
      install-cmd: "npm install --no-audit --no-fund"
      gates-ref: ${{ github.event.pull_request.head.sha || github.sha }}

  red:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22" }
      - name: Red-Fixture bauen
        working-directory: fixtures/red
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: structure MUSS rot sein
        run: |
          if node scripts/check-structure.mjs --dist fixtures/red/dist --profile profiles/fixture.json; then
            echo "::error::check-structure hat die rote Fixture NICHT gefangen"; exit 1
          fi
          echo "ok: structure faengt die Verstoesse."
      - name: assets MUSS rot sein (Zero-JS)
        run: |
          if node scripts/check-assets.mjs --dist fixtures/red/dist --profile profiles/fixture.json; then
            echo "::error::check-assets hat die rote Fixture NICHT gefangen"; exit 1
          fi
          echo "ok: assets faengt das JS-Budget."
      - name: links MUSS rot sein (toter interner Link)
        run: |
          if npx --yes linkinator ./fixtures/red/dist --recurse --skip "^https?://(?!localhost|127\.0\.0\.1)" --verbosity error; then
            echo "::error::linkinator hat den toten Link NICHT gefangen"; exit 1
          fi
          echo "ok: links faengt den toten internen Link."
      - name: structure MUSS auf green gruen sein (Gegenprobe)
        working-directory: fixtures/green
        run: |
          npm install --no-audit --no-fund && npm run build
          node ../../scripts/check-structure.mjs --dist dist --profile ../../profiles/fixture.json
          node ../../scripts/check-assets.mjs   --dist dist --profile ../../profiles/fixture.json

  # Prod-Modus (--base-url, Fleet-Cron ADR-0150 Slice 4): green serviert muss GRUEN,
  # red serviert muss ROT sein (js_kb=0 via resource-summary:script + Score-Verstoesse).
  fleet-mode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22" }
      - name: Fixtures bauen
        run: |
          (cd fixtures/green && npm install --no-audit --no-fund && npm run build)
          (cd fixtures/red   && npm install --no-audit --no-fund && npm run build)
      - name: lhci installieren (isoliert, gepinnt)
        run: npm install --no-save --prefix .gates-tools @lhci/cli@0.15.1 >/dev/null 2>&1
      - name: Prod-Modus MUSS auf green gruen sein
        run: |
          npx --yes http-server fixtures/green/dist -p 8080 --silent &
          sleep 2
          node scripts/lhci-config.mjs --base-url http://127.0.0.1:8080 --profile profiles/fixture.json > rc-green.json
          .gates-tools/node_modules/.bin/lhci autorun --config=rc-green.json
          echo "ok: Prod-Modus ist auf der gruenen Fixture gruen."
      - name: Prod-Modus MUSS auf red rot sein
        run: |
          npx --yes http-server fixtures/red/dist -p 8081 --silent &
          sleep 2
          node scripts/lhci-config.mjs --base-url http://127.0.0.1:8081 --profile profiles/fixture.json --routes "/" > rc-red.json
          if .gates-tools/node_modules/.bin/lhci autorun --config=rc-red.json; then
            echo "::error::Prod-Modus hat die rote Fixture NICHT gefangen"; exit 1
          fi
          echo "ok: Prod-Modus faengt js_kb-Verstoss + Score-Verstoesse."

  # Validiert check-acceptance.mjs (Hebel 1, ADR-0150 E4):
  #   - keine acceptance.yml → skip (exit 0, zero-overhead-Nachweis)
  #   - failing shell-Assertion → exit 1 (red, gefangen-Nachweis)
  #   - passing shell-Assertion → exit 0 (green, Gegenprobe)
  acceptance-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22" }
      - name: check-acceptance MUSS ohne acceptance.yml gruen sein (skip)
        run: node scripts/check-acceptance.mjs --acceptance /nonexistent-acceptance.yml
      - name: check-acceptance MUSS failing shell-Assertion fangen (red)
        run: |
          printf 'assertions:\n  - type: shell\n    command: "exit 1"\n    description: "Schlaegt immer fehl"\n' > /tmp/acceptance-red.yml
          if node scripts/check-acceptance.mjs --acceptance /tmp/acceptance-red.yml --dist . --lh-dir /tmp; then
            echo "::error::check-acceptance hat eine failing shell-Assertion NICHT gefangen"; exit 1
          fi
          echo "ok: check-acceptance faengt failing shell-Assertion."
      - name: check-acceptance MUSS passing shell-Assertion gruen sein (green)
        run: |
          printf 'assertions:\n  - type: shell\n    command: "exit 0"\n    description: "Schlaegt nie fehl"\n' > /tmp/acceptance-green.yml
          node scripts/check-acceptance.mjs --acceptance /tmp/acceptance-green.yml --dist . --lh-dir /tmp
          echo "ok: check-acceptance laesst passing shell-Assertion durch."

  # Validiert Invarianten von app-ci.yml (ADR-0150 §3.3):
  #   - evals-Guard als Step-Level-Check (evals/promptfooconfig.yaml)
  #   - kein secrets:inherit (I4)
  app-ci-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22" }
      - name: app-default.json ist valides JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('profiles/app-default.json','utf8')); console.log('ok: app-default.json ist valides JSON')"
      - name: app-ci.yml enthaelt evals-Guard (evals/promptfooconfig.yaml Step-Check)
        run: |
          if ! grep -q "evals/promptfooconfig.yaml" .github/workflows/app-ci.yml; then
            echo "::error::app-ci.yml: evals-Guard (evals/promptfooconfig.yaml Check) fehlt"; exit 1
          fi
          echo "ok: evals-Guard vorhanden."
      - name: app-ci.yml enthaelt kein secrets:inherit (I4)
        # grep -E mit ^[^#]* schliesst Kommentar-Zeilen aus (verhindert False-Positive durch
        # Dokumentations-Kommentare wie "# ... kein secrets: inherit ..." im Header).
        run: |
          if grep -Eq "^[^#]*secrets:\s*inherit" .github/workflows/app-ci.yml; then
            echo "::error::app-ci.yml: secrets:inherit verboten (I4)"; exit 1
          fi
          echo "ok: kein secrets:inherit."
