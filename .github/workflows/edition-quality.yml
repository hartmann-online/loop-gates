name: edition-quality

# Zentrales Quality-Gate für Kultmeister-Editionen (ADR-0150 E2/E3).
# Aufruf aus einem Edition-Repo (Hook):
#   jobs:
#     quality:
#       uses: hartmann-online/loop-gates/.github/workflows/edition-quality.yml@v1
#       with: { profile: edition-handcrafted }
#
# Fehlersemantik: Job `quality` = blockierend (fail-closed) · Job `screenshots` = warn-only.
# Lighthouse-Ausnahme (ADR-0072): Performance-Score warn-only; SEO/Best-Practices/A11y-Scores
# und die deterministischen Gewichts-Budgets (total/image/font/js_kb) blockieren.
# Jobs bewusst konsolidiert (1 blockierender Job): ein Required Check, sequentielle, agent-lesbare
# Logs, kein Artefakt-Geschiebe — Semantik der Spec bleibt erhalten.

on:
  workflow_call:
    inputs:
      profile:
        description: "Profilname unter profiles/ (ohne .json)"
        type: string
        required: true
      node-version:
        type: string
        default: "22"
      install-cmd:
        type: string
        default: "npm ci"
      build-cmd:
        type: string
        default: "npm run build"
      dist-dir:
        type: string
        default: "dist"
      workdir:
        description: "Arbeitsverzeichnis der Site im Caller-Repo"
        type: string
        default: "."
      routes:
        description: "Komma-separierte Routen-Liste; überschreibt profile.routes (Editionen haben individuelle Seitenbäume)"
        type: string
        default: ""
      link-skip:
        description: "Zusätzliches Regex für Links, die zur LAUFZEIT via Platform-Rewrite aufgelöst werden (z. B. Plausible-Proxy /js/script\\.js) und statisch 404 wären"
        type: string
        default: ""
      gates-ref:
        description: "Ref des loop-gates-Repos (Default v1; Selbsttest setzt den PR-SHA)"
        type: string
        default: "v1"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.workdir }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: hartmann-online/loop-gates
          ref: ${{ inputs.gates-ref }}
          path: .gates

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install & Build
        run: |
          ${{ inputs.install-cmd }}
          ${{ inputs.build-cmd }}

      - name: Structure (Pflicht-Meta, h1)   # blockierend
        run: node "$GITHUB_WORKSPACE/.gates/scripts/check-structure.mjs" --dist "${{ inputs.dist-dir }}" --profile "$GITHUB_WORKSPACE/.gates/profiles/${{ inputs.profile }}.json"

      - name: Assets (Gewichts-Budgets)      # blockierend, inkl. js_kb (Zero-JS, ADR-0081)
        run: node "$GITHUB_WORKSPACE/.gates/scripts/check-assets.mjs" --dist "${{ inputs.dist-dir }}" --profile "$GITHUB_WORKSPACE/.gates/profiles/${{ inputs.profile }}.json"

      - name: Links (interne Links/Assets)   # blockierend
        # Lookahead: linkinator serviert das dist lokal über http(s)://localhost — nur EXTERNE
        # Domains werden im PR-Pfad übersprungen (externe Prüfung gehört in Content-Check/Cron).
        run: |
          SKIP='^https?://(?!localhost|127\.0\.0\.1)'
          if [ -n "${{ inputs.link-skip }}" ]; then SKIP="$SKIP|${{ inputs.link-skip }}"; fi
          npx --yes linkinator "./${{ inputs.dist-dir }}" --recurse --skip "$SKIP" --verbosity error

      - name: Lighthouse (Scores je Profil)  # perf=warn, seo/bp/a11y=blockierend (ADR-0072)
        run: |
          node "$GITHUB_WORKSPACE/.gates/scripts/lhci-config.mjs" --dist "${{ inputs.dist-dir }}" --profile "$GITHUB_WORKSPACE/.gates/profiles/${{ inputs.profile }}.json" --routes "${{ inputs.routes }}" > lighthouserc.json
          # Isoliert vom Caller-node_modules (Repo-overrides können lhci/express brechen) + gepinnt.
          npm install --no-save --prefix "$GITHUB_WORKSPACE/.gates-tools" @lhci/cli@0.15.1 >/dev/null 2>&1
          "$GITHUB_WORKSPACE/.gates-tools/node_modules/.bin/lhci" autorun --config=lighthouserc.json

  screenshots:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ inputs.workdir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: hartmann-online/loop-gates
          ref: ${{ inputs.gates-ref }}
          path: .gates
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
      - name: Build
        run: |
          ${{ inputs.install-cmd }}
          ${{ inputs.build-cmd }}
      - name: Screenshots + Diff gegen baseline/ (warn-only)
        run: |
          npm install --no-save playwright pixelmatch pngjs >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null
          node "$GITHUB_WORKSPACE/.gates/scripts/screenshots.mjs" --dist "${{ inputs.dist-dir }}" --profile "$GITHUB_WORKSPACE/.gates/profiles/${{ inputs.profile }}.json" --baseline baseline --routes "${{ inputs.routes }}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ inputs.profile }}
          path: ${{ inputs.workdir }}/.screenshots/
          if-no-files-found: ignore
